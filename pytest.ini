[pytest]
# https://pytest-django.readthedocs.io/en/latest/configuring_django.html
DJANGO_SETTINGS_MODULE = triplanner.settings
django_debug_mode = false

# Fail tests that render templates which make use of invalid template variables.
FAIL_INVALID_TEMPLATE_VARS = True
addopts =
    # pytest
    --strict-markers
    -vv
    -rfE
    # pytest-django
    --no-migrations
    # pytest-cov
    --cov=.
    --cov-branch
    --cov-config=pytest.ini
    --cov-report=xml
    --cov-report=term-missing
    --cov-report=term

python_files = tests.py test_*.py *_tests.py

# https://pytest-cov.readthedocs.io/en/latest/config.html
# https://coverage.readthedocs.io/en/latest/config.html
[coverage:run]
relative_files = true
source =
    nucleo/
    triplanner/
omit =
    manage.py
    .venv/*
    coverage/*
    build/*
    **/migrations/*
    **/tests/*
