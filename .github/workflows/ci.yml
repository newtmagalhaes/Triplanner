name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install --requirement requirements.txt --no-cache-dir --disable-pip-version-check

      - name: Run tests
        run: pytest --cov

      - name: Get coverage
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage/.coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
